name: Keep Alive

on:
  schedule:
    # Run every 50 days to prevent GitHub from disabling scheduled workflows
    # (GitHub disables them after 60 days of repository inactivity)
    - cron: '0 12 1 */2 *'  # 1st day of every other month at 12:00 UTC
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update keep-alive timestamp
        run: |
          echo "Last keep-alive: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .github/keep-alive.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/keep-alive.txt
          git commit -m "chore: keep-alive $(date -u '+%Y-%m-%d')" || echo "Nothing to commit"
          git push
